services:
  # Config Service
  config-service:
    build: ./services/config-service
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - CONFIG_WRITE_TOKEN=${CONFIG_WRITE_TOKEN:-dev-config-token-change-in-production}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Auth Service
  auth-service:
    build: ./services/auth-service
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DB_HOST=auth-db
      - DB_PORT=5432
      - DB_NAME=auth
      - DB_USER=authuser
      - DB_PASSWORD=${AUTH_DB_PASSWORD:-authpass}
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-production}
      - REDIS_URL=redis://redis:6379
    depends_on:
      auth-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Auth Database
  auth-db:
    image: postgres:17-alpine
    environment:
      - POSTGRES_DB=auth
      - POSTGRES_USER=authuser
      - POSTGRES_PASSWORD=${AUTH_DB_PASSWORD:-authpass}
    volumes:
      - auth-db-data:/var/lib/postgresql/data
      - ./services/auth-service/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authuser -d auth"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # URL Service
  url-service:
    build: ./services/url-service
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - DB_HOST=url-db
      - DB_PORT=3306
      - DB_NAME=urlshort
      - DB_USER=urluser
      - DB_PASSWORD=${URL_DB_PASSWORD:-urlpass}
      - AUTH_SERVICE_URL=http://auth-service:3001
      - CONFIG_SERVICE_URL=http://config-service:3000
      - ANALYTICS_SERVICE_URL=http://analytics-service:3005
      - SERVICE_TOKEN=${SERVICE_TOKEN:-dev-service-token-change-in-production}
      - REDIS_URL=redis://redis:6379
    depends_on:
      url-db:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # URL Database
  url-db:
    image: mysql:8-oracle
    environment:
      - MYSQL_DATABASE=urlshort
      - MYSQL_USER=urluser
      - MYSQL_PASSWORD=${URL_DB_PASSWORD:-urlpass}
      - MYSQL_ROOT_PASSWORD=${URL_DB_ROOT_PASSWORD:-rootpass}
    volumes:
      - url-db-data:/var/lib/mysql
      - ./services/url-service/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "urluser", "-p${URL_DB_PASSWORD:-urlpass}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Redirect Service
  redirect-service:
    build: ./services/redirect-service
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - URL_SERVICE_URL=http://url-service:3002
      - CONFIG_SERVICE_URL=http://config-service:3000
      - ANALYTICS_SERVICE_URL=http://analytics-service:3005
      - SERVICE_TOKEN=${SERVICE_TOKEN:-dev-service-token-change-in-production}
      - IP_HASH_SALT=${IP_HASH_SALT:-dev-ip-hash-salt-change-in-production}
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
      url-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
      analytics-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Admin Service
  admin-service:
    build: ./services/admin-service
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - AUTH_SERVICE_URL=http://auth-service:3001
      - URL_SERVICE_URL=http://url-service:3002
      - CONFIG_SERVICE_URL=http://config-service:3000
      - CONFIG_WRITE_TOKEN=${CONFIG_WRITE_TOKEN:-dev-config-token-change-in-production}
      - ANALYTICS_SERVICE_URL=http://analytics-service:3005
      - SERVICE_TOKEN=${SERVICE_TOKEN:-dev-service-token-change-in-production}
    depends_on:
      auth-service:
        condition: service_healthy
      url-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
      analytics-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3003/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Admin UI
  admin-ui:
    build: ./services/admin-ui
    ports:
      - "3004:3004"
    environment:
      - PORT=3004
    depends_on:
      - admin-service
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3004', (res) => process.exit(res.statusCode === 200 ? 0 : 1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Analytics Service
  analytics-service:
    build: ./services/analytics-service
    ports:
      - "3005:3005"
    environment:
      - PORT=3005
      - CLICKHOUSE_URL=jdbc:clickhouse://clickhouse:8123/analytics
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
      - SERVICE_TOKEN=${SERVICE_TOKEN:-dev-service-token-change-in-production}
    depends_on:
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3005/actuator/health/liveness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ClickHouse — columnar store for analytics-service
  clickhouse:
    image: clickhouse/clickhouse-server:26.3
    environment:
      - CLICKHOUSE_DB=analytics
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./services/analytics-service/clickhouse-init:/docker-entrypoint-initdb.d
    ports:
      - "8123:8123"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  # Redis — shared cache and rate limiter
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  auth-db-data:
  url-db-data:
  clickhouse-data:
  redis-data: