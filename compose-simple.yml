services:
  # Config Service
  config-service:
    build: ./services/config-service
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - CONFIG_WRITE_TOKEN=${CONFIG_WRITE_TOKEN:-dev-config-token-change-in-production}

  # Auth Service
  auth-service:
    build: ./services/auth-service
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DB_HOST=auth-db
      - DB_PORT=5432
      - DB_NAME=auth
      - DB_USER=authuser
      - DB_PASSWORD=${AUTH_DB_PASSWORD:-authpass}
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-production}
      - REDIS_URL=redis://redis:6379
    depends_on:
      - auth-db
      - redis

  # Auth Database
  auth-db:
    image: postgres:17-alpine
    environment:
      - POSTGRES_DB=auth
      - POSTGRES_USER=authuser
      - POSTGRES_PASSWORD=${AUTH_DB_PASSWORD:-authpass}

  # Redirect Service
  redirect-service:
    build: ./services/redirect-service
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - URL_SERVICE_URL=http://url-service:3002
      - CONFIG_SERVICE_URL=http://config-service:3000
      - ANALYTICS_SERVICE_URL=http://analytics-service:3005
      - SERVICE_TOKEN=${SERVICE_TOKEN:-dev-service-token-change-in-production}
      - IP_HASH_SALT=${IP_HASH_SALT:-dev-ip-hash-salt-change-in-production}
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
      - url-service
      - config-service
      - analytics-service

  # URL Service
  url-service:
    build: ./services/url-service
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - DB_HOST=url-db
      - DB_PORT=3306
      - DB_NAME=urlshort
      - DB_USER=urluser
      - DB_PASSWORD=${URL_DB_PASSWORD:-urlpass}
      - AUTH_SERVICE_URL=http://auth-service:3001
      - CONFIG_SERVICE_URL=http://config-service:3000
      - ANALYTICS_SERVICE_URL=http://analytics-service:3005
      - SERVICE_TOKEN=${SERVICE_TOKEN:-dev-service-token-change-in-production}
      - REDIS_URL=redis://redis:6379
    depends_on:
      - url-db
      - auth-service
      - config-service
      - redis

  # URL Database
  url-db:
    image: mysql:8-oracle
    environment:
      - MYSQL_DATABASE=urlshort
      - MYSQL_USER=urluser
      - MYSQL_PASSWORD=${URL_DB_PASSWORD:-urlpass}
      - MYSQL_ROOT_PASSWORD=${URL_DB_ROOT_PASSWORD:-rootpass}
    volumes:
      - url-db-data:/var/lib/mysql
      - ./services/url-service/init:/docker-entrypoint-initdb.d

  # Analytics Service
  analytics-service:
    build: ./services/analytics-service
    ports:
      - "3005:3005"
    environment:
      - PORT=3005
      - CLICKHOUSE_URL=jdbc:clickhouse://clickhouse:8123/analytics
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
      - SERVICE_TOKEN=${SERVICE_TOKEN:-dev-service-token-change-in-production}
    depends_on:
      - clickhouse

  # ClickHouse — columnar store for analytics-service
  clickhouse:
    image: clickhouse/clickhouse-server:26.3
    environment:
      - CLICKHOUSE_DB=analytics
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./services/analytics-service/clickhouse-init:/docker-entrypoint-initdb.d
    ports:
      - "8123:8123"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  # Redis — shared cache and rate limiter
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  auth-db-data:
  url-db-data:
  clickhouse-data:
  redis-data: