name: Analytics Service CI

on:
  push:
    paths:
      - 'services/analytics-service/**'
      - '.github/workflows/analytics-service.yml'
    branches: [main]
  pull_request:
    paths:
      - 'services/analytics-service/**'

jobs:
  build:
    name: Build and test analytics-service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Run unit tests
        working-directory: services/analytics-service
        run: mvn -B verify --no-transfer-progress
      - name: Build Docker image
        run: docker build -t microshort-analytics:ci services/analytics-service

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag image
        if: github.ref == 'refs/heads/main'
        run: |
          docker tag microshort-analytics:ci ghcr.io/pxl-digital-application-samples/microshort-analytics-service:latest
          docker tag microshort-analytics:ci ghcr.io/pxl-digital-application-samples/microshort-analytics-service:${{ github.sha }}

      - name: Push image
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ghcr.io/pxl-digital-application-samples/microshort-analytics-service:latest
          docker push ghcr.io/pxl-digital-application-samples/microshort-analytics-service:${{ github.sha }}
