name: Build & Test JS Services

on:
  push:
    paths:
      - 'services/admin-service/**'
      - 'services/admin-ui/**'
      - 'services/auth-service/**'
      - 'services/redirect-service/**'
      - 'services/url-service/**'
    branches: [ main ]
  pull_request:
    paths:
      - 'services/admin-service/**'
      - 'services/admin-ui/**'
      - 'services/auth-service/**'
      - 'services/redirect-service/**'
      - 'services/url-service/**'

jobs:
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: admin-service
            port: 3003
            entry: src/index.js
            has_tests: true
          - service: admin-ui
            port: 3004
            entry: server.js
            has_tests: false
          - service: auth-service
            port: 3001
            entry: src/index.js
            has_tests: true
          - service: redirect-service
            port: 8080
            entry: src/index.js
            has_tests: true
          - service: url-service
            port: 3002
            entry: src/index.js
            has_tests: true

    defaults:
      run:
        working-directory: services/${{ matrix.service }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        if: matrix.has_tests
        run: npm test

      - name: VanJS source-pattern checks (admin-ui)
        if: matrix.service == 'admin-ui'
        working-directory: .
        run: bash test-ui.sh --source-only

      - name: Syntax check
        run: node --check ${{ matrix.entry }}

      - name: Build Docker image
        run: docker build -t microshort-${{ matrix.service }}:ci .

      - name: Smoke test /health
        run: |
          docker run -d --name svc \
            -e JWT_SECRET=change-me-in-production \
            -e DB_PASSWORD=change-me-in-production \
            -e SERVICE_TOKEN=change-me-in-production \
            -e REDIRECT_SERVICE_TOKEN=change-me-in-production-redirect \
            -e URL_SERVICE_TOKEN=change-me-in-production-url \
            -e ADMIN_SERVICE_TOKEN=change-me-in-production-admin \
            -e IP_HASH_SALT=change-me-in-production \
            -e CONFIG_WRITE_TOKEN=change-me-in-production \
            -p 127.0.0.1:${{ matrix.port }}:${{ matrix.port }} \
            microshort-${{ matrix.service }}:ci
          HEALTHY=false
          for i in $(seq 1 15); do
            if curl -sf http://127.0.0.1:${{ matrix.port }}/health; then
              HEALTHY=true
              break
            fi
            sleep 1
          done
          if [ "$HEALTHY" != "true" ]; then
            echo "Health check failed after 15s"
            docker logs svc
            docker stop svc
            docker rm svc
            exit 1
          fi
          echo "Health check passed"
          docker stop svc
          docker rm svc


      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag image
        if: github.ref == 'refs/heads/main'
        run: |
          docker tag microshort-${{ matrix.service }}:ci ghcr.io/pxl-digital-application-samples/microshort-${{ matrix.service }}:latest
          docker tag microshort-${{ matrix.service }}:ci ghcr.io/pxl-digital-application-samples/microshort-${{ matrix.service }}:${{ github.sha }}

      - name: Push image
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ghcr.io/pxl-digital-application-samples/microshort-${{ matrix.service }}:latest
          docker push ghcr.io/pxl-digital-application-samples/microshort-${{ matrix.service }}:${{ github.sha }}
