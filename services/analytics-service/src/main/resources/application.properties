server.port=${PORT:3005}

# ClickHouse DataSource — HTTP interface (8123)
spring.datasource.url=${CLICKHOUSE_URL:jdbc:clickhouse://clickhouse:8123/analytics}
spring.datasource.driver-class-name=com.clickhouse.jdbc.ClickHouseDriver
spring.datasource.username=${CLICKHOUSE_USER:default}
spring.datasource.password=${CLICKHOUSE_PASSWORD:}
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.maximum-pool-size=5

# Actuator — expose health (probes) and Prometheus metrics
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
# Include the DataSource (ClickHouse) check in the readiness probe
management.endpoint.health.group.readiness.include=readinessState,db
management.endpoint.health.show-details=always

# Service tokens (validated in ServiceTokenFilter). No defaults: an unset
# token contributes nothing to the allow-list, so a misconfigured deployment
# fails closed (401) instead of accepting a well-known dev token.
service.allowed-tokens=${REDIRECT_SERVICE_TOKEN:},${URL_SERVICE_TOKEN:},${ADMIN_SERVICE_TOKEN:},${SERVICE_TOKEN:}

# Structured JSON logging (Spring Boot 3.4+)
logging.structured.format.console=ecs

# OpenAPI / Swagger UI — served at /docs, raw JSON at /v3/api-docs
springdoc.swagger-ui.path=/docs
springdoc.api-docs.path=/v3/api-docs
springdoc.paths-to-exclude=/actuator/**

